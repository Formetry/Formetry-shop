<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Formetry – 3D Print Shop</title>

  <link rel="icon" id="favicon" href="Logo (black background).png">
  <style>
    :root{ --bg:#0b0d10; --fg:#f4f6f8; --muted:#c7ccd1; --pri:#6ee7ff; --pri-2:#8b5cf6; --line:#20242c; }
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#0a0c10,#0b0d10 30%);color:var(--fg);font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Helvetica,Arial}
    .container{max-width:1100px;margin:0 auto;padding:24px}
    .hero{display:flex;flex-direction:column;align-items:center;gap:16px;padding:42px 0 10px}
    .hero-logo{height:96px}
    .hero-title{font-size:42px;font-weight:800;margin:0}

    .filters{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:12px 0 20px}
    .filters button{padding:8px 14px;border-radius:12px;border:1px solid var(--line);background:#11151b;color:var(--fg);cursor:pointer}
    .filters button.active{background:linear-gradient(90deg,var(--pri),var(--pri-2));color:#0a0c10;font-weight:700;border:none}

    .search-box{margin:0 auto 20px;max-width:460px;display:flex;gap:6px;position:relative}
    .search-box input{flex:1;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:#0f1319;color:var(--fg)}
    .search-box button{padding:0 14px;border-radius:12px;border:1px solid var(--line);background:#11151b;color:var(--fg);cursor:pointer}

    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
    .card{border:1px solid var(--line);background:linear-gradient(180deg,#0e1217,#0b0f14);border-radius:18px;overflow:hidden;display:flex;flex-direction:column}

    .thumb{aspect-ratio:4/3;background:#0c1016;border-bottom:1px solid var(--line);position:relative;overflow:hidden;display:grid;place-items:center;cursor:zoom-in}
    .thumb img{width:100%;height:100%;object-fit:cover;display:block}

    .card-body{padding:14px}
    .title{font-weight:700;margin:0 0 6px}
    .muted{color:var(--muted);font-size:14px}
    .price{margin-top:10px;font-weight:800;margin-bottom:10px}

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 14px;border-radius:12px;border:1px solid var(--line);background:#11151b;cursor:pointer;color:var(--fg);text-decoration:none}
    .btn.primary{background:linear-gradient(90deg,var(--pri),var(--pri-2));color:#0a0c10;font-weight:800;border:none}
    .btn.full{width:100%}

    /* Image lightbox */
    #imgLightbox::backdrop{background:rgba(0,0,0,.7)}
    #imgLightbox img{max-width:90vw;max-height:80vh;display:block;border-radius:12px}

    footer{margin-top:24px;color:#c7ccd1}
  </style>
</head>

<body>
  <main class="container">
    <section class="hero" aria-label="Store header">
      <img src="Logo (black background).png" alt="Company Logo" class="hero-logo" />
      <h1 class="hero-title">Formetry</h1>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
        <a class="btn" href="https://wa.me/27791987540" target="_blank" rel="noopener">💬 WhatsApp us</a>
        <a class="btn" href="mailto:formetry3d@outlook.com">✉️ Email us</a>
      </div>
    </section>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search products..."/>
      <button id="clearSearch" title="Clear">✕</button>
    </div>
    <div class="filters" id="filters"></div>

    <h2 style="margin:10px 0 8px;font-size:20px;font-weight:800">Products</h2>
    <section class="grid" id="grid"></section>

    <footer>
      <div class="container" style="padding:30px 0">
        <div style="display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between">
          <div style="display:flex;align-items:center;gap:10px">
            <img src="Logo (black background).png" alt="Company Logo" style="height:40px"/>
            <div>
              <div style="font-weight:700">Formetry</div>
              <div style="color:#c7ccd1">Quality 3D prints • South Africa</div>
            </div>
          </div>
          <div style="color:#c7ccd1">© <span id="yr"></span> Formetry. All rights reserved.</div>
        </div>
      </div>
    </footer>
  </main>

  <!-- Image Lightbox -->
  <dialog id="imgLightbox">
    <img id="lightboxImg" alt="Preview"/>
  </dialog>

  <script>
  /* ---------- Helpers ---------- */
  const ZAR = n => `R${Number(n).toFixed(2)}`;
  const el = s => document.querySelector(s);

  const WHATSAPP_NUMBER = '27791987540';

  /* ---------- Products ---------- */
  const PRODUCTS = [
    { id:'custom-piggy-bank', name:'Customised Piggy Bank', price:250, cat:'custom', img:'Personalised piggy bank box.png', desc:'Add a name to the piggy bank.' },
    { id:'yarn-bowl', name:'Yarn Bowl', price:350, cat:'hobbies', img:'Yarn bowl Upscaled to 150.png', desc:'Crochet with style and comfort.' },
    { id:'axolotl-articulate', name:'Axolotl Keychain', price:120, cat:'toys', img:'axolotl articulate.png', desc:'A keychain that can bend!' },
    { id:'hex-drawer', name:'Hexagonal Drawer Unit', price:190, cat:'home', img:'4. Singular Hexagonal drawer.png', desc:'Buy per unit. Stackable. Limited colours.' },
    { id:'honeycomb-vase', name:'Honeycomb Vase', price:200, cat:'home', img:'5. Honeycomb vase.png', desc:'Limited colours. Size: 115 mm height.' },
    { id:'five-hex-shelf', name:'Five-Part Honeycomb Shelf', price:340, cat:'home', img:'6. Five part honeycomb shelf.png', desc:'5-hex shelf. Size: 241 mm length.' },

    /* Wall art */
    { id:'wall-cat', name:'3D Wall Art – Cat', price:180, cat:'home', img:'7. 3D wall art - cat.png', desc:'Width: 156 mm • Length: 270 mm' },
    { id:'wall-deer', name:'3D Wall Art – Deer', price:180, cat:'home', img:'7. 3D wall art - Deer.png', desc:'Width: 156 mm • Length: 270 mm' },
    { id:'wall-eagle', name:'3D Wall Art – Eagle', price:180, cat:'home', img:'7. 3D wall art - Eagle.png', desc:'Width: 231 mm • Length: 246 mm' },
    { id:'wall-elephant', name:'3D Wall Art – Elephant', price:180, cat:'home', img:'7. 3D wall art - Elephant.png', desc:'Width: 243 mm • Length: 253 mm' },
    { id:'wall-fox', name:'3D Wall Art – Fox', price:180, cat:'home', img:'7. 3D wall art - Fox.png', desc:'Width: 261 mm • Length: 266 mm' },
    { id:'wall-iron', name:'3D Wall Art – Iron Man', price:180, cat:'home', img:'7. 3D wall art - Iron Man.png', desc:'Width: 161 mm • Length: 256 mm' },
    { id:'wall-lion', name:'3D Wall Art – Lion', price:180, cat:'home', img:'7. 3D wall art - Lion.png', desc:'Width: 250 mm • Length: 200 mm' },
    { id:'wall-panda', name:'3D Wall Art – Panda', price:180, cat:'home', img:'7. 3D wall art - Panda.png', desc:'Width: 288 mm • Length: 168 mm' },
    { id:'wall-wolf', name:'3D Wall Art – Wolf', price:180, cat:'home', img:'7. 3D wall art - Wolf.png', desc:'Width: 190 mm • Length: 264 mm' },
  ];

  /* ---------- Filters & Search ---------- */
  let currentFilter = 'all';
  let searchTerm = '';

  function buildWhatsAppUrl(product){
    const msg = `Hi Formetry! I\'d like to order: ${product.name} (R${Number(product.price).toFixed(0)}).

Quantity: 
Colour (if applicable): 
Custom name (if applicable): `;
    return `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  }

  function buildFilters(){
    const f = el('#filters');
    if(!f) return;
    f.innerHTML = '';
    const cats = ['all', ...new Set(PRODUCTS.map(p=>p.cat))];
    cats.forEach(cat => {
      const b = document.createElement('button');
      b.textContent = cat.charAt(0).toUpperCase()+cat.slice(1);
      if(cat === currentFilter) b.classList.add('active');
      b.onclick = () => { currentFilter = cat; buildFilters(); render(); };
      f.appendChild(b);
    });
  }

  function render(){
    const g = el('#grid');
    if(!g) return;
    g.innerHTML = '';
    const term = (searchTerm||'').toLowerCase();

    PRODUCTS
      .filter(p => currentFilter === 'all' || p.cat === currentFilter)
      .filter(p => !term || p.name.toLowerCase().includes(term) || (p.desc||'').toLowerCase().includes(term))
      .forEach(p => {
        const c = document.createElement('article');
        c.className = 'card';
        c.innerHTML = `
          <div class="thumb" data-zoom="${p.img}"><img alt="${p.name}" src="${p.img}" loading="lazy"/></div>
          <div class="card-body">
            <h3 class="title">${p.name}</h3>
            <div class="muted">${p.desc || ''}</div>
            <div class="price">${ZAR(p.price)}</div>
            <a class="btn primary full" href="${buildWhatsAppUrl(p)}" target="_blank" rel="noopener">Order on WhatsApp</a>
          </div>`;
        g.appendChild(c);
      });
  }

  /* ---------- Search ---------- */
  const searchInput = el('#searchInput');
  const clearBtn = el('#clearSearch');
  function updateClearBtn(){ if(clearBtn) clearBtn.style.display = (searchInput && searchInput.value.trim().length) ? 'inline-block' : 'none'; }

  if(searchInput){
    updateClearBtn();
    searchInput.addEventListener('input', ()=>{
      searchTerm = searchInput.value.trim();
      updateClearBtn();
      render();
    });
  }
  if(clearBtn && searchInput){
    clearBtn.addEventListener('click', ()=>{
      searchInput.value='';
      searchTerm='';
      updateClearBtn();
      render();
      searchInput.focus();
    });
  }

  /* ---------- Image lightbox ---------- */
  document.addEventListener('click', (ev)=>{
    const target = ev.target.closest('.thumb');
    if(!target) return;
    const src = target.getAttribute('data-zoom');
    const dlg = el('#imgLightbox');
    const img = el('#lightboxImg');
    if(dlg && img){
      img.src = src;
      dlg.showModal();
    }
  });
  el('#imgLightbox')?.addEventListener('click', e => e.currentTarget.close());

  /* ---------- Init ---------- */
  const yr = el('#yr');
  if(yr) yr.textContent = new Date().getFullYear();

  buildFilters();
  render();
  </script>
</body>
</html>
